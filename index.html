<!DOCTYPE html>
<html class="light" lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Roland-Garros BNP Paribas</title>
    <script src="tailwind.min.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#00915A",
                        secondary: "#5f5f5f",
                        background: "#ffffff",
                        text: "#000000"
                    },
                    fontFamily: {
                        bnpp: ["BNPPSansCond", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        @font-face {
            font-family: 'BNPPSansCond';
            src: url('bnpp-sans-cond-v2.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'BNPPSansCond';
            src: url('bnpp-sans-cond-bold-v2.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }

        body {
            font-family: 'BNPPSansCond', sans-serif;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 0;
        }

        .viewport-fixed {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Subtle texture for a premium feel */
        .premium-bg {
            background-image: radial-gradient(circle at 2px 2px, rgba(0, 145, 90, 0.03) 1px, transparent 0);
            background-size: 40px 40px;
        }
    </style>
</head>

<body class="bg-background text-text viewport-fixed premium-bg">
    <main class="relative flex-1 flex flex-col items-center justify-center px-6 text-center">
        <!-- Logo BNP Paribas -->
        <div class="mb-12">
            <img src="logoBNP_Paribas.svg" alt="BNP Paribas" class="h-32 md:h-40 mx-auto">
        </div>

        <!-- Edition Badge -->
        <div class="mb-8">
            <span
                class="inline-block px-6 py-1.5 rounded-full border border-gray-200 text-[#5f5f5f] font-bold text-sm tracking-widest uppercase bg-white/50 backdrop-blur-sm">
                Édition 2026
            </span>
        </div>

        <!-- Main Heading -->
        <div class="max-w-4xl mx-auto space-y-6">
            <h1 class="text-5xl md:text-7xl font-bold leading-[1.1] tracking-tight">
                Accédez à l’expérience et découvrez <br>
                <span class="text-primary">si vous remportez vos places</span><br>
                pour Roland-Garros.
            </h1>

            <p class="text-xl md:text-2xl text-secondary max-w-2xl mx-auto font-medium">
                Chaque code peut vous rapprocher du court central.
            </p>
        </div>

        <!-- Action Button -->
        <div class="mt-16">
            <button onclick="window.location.href='digicode.html'"
                class="bg-primary text-white px-16 py-6 rounded-full font-bold text-3xl shadow-[0_20px_50px_rgba(0,145,90,0.2)] hover:shadow-[0_20px_60px_rgba(0,145,90,0.3)] hover:scale-105 transition-all duration-300 active:scale-95">
                Entrer mon code
            </button>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-10 flex flex-col items-center space-y-4">
        <div class="h-[1px] w-32 bg-gray-100"></div>
        <div class="text-[0.7rem] text-gray-400 font-bold tracking-[0.2em] uppercase">
            © 2026 Vif-Argent - La Fourmi
        </div>
    </footer>
</body>

</html>
