<!DOCTYPE html>

<html class="light" lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Roland-Garros BNP Parisbas</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link

                        "secondary-container": "#9ff6b4",

                        "on-secondary-fixed": "#00210c",
                        "tertiary-fixed-dim": "#abcdcd",

                        "on-background": "#1a1c1c",

                        "on-secondary-container": "#19733e",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#ffb598",

                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Manrope"],

    <style>
        body {
            font-family: 'Manrope', sans-serif;
        }

        h1,
        h2,
        h3,
        .brand-font {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .clay-texture {
            background-color: #a03c04;
            background-image: radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }

        .editorial-shadow {
            box-shadow: 0 12px 32px rgba(26, 28, 28, 0.06);
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
        }

        /* No scroll container */
        .viewport-fixed {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>

<body class="bg-background text-on-surface viewport-fixed">
    <main class="relative flex-1 flex items-center justify-center overflow-hidden">
        <!-- Hero Section adapted for Landscape Tablet (No Scroll) -->
        <section class="relative w-full h-full flex flex-col justify-center px-16 lg:px-24">
            <!-- Background Elements -->
            <div class="absolute inset-0 z-0">
                <div class="absolute inset-0 clay-texture opacity-5"></div>
                <div class="absolute top-0 right-0 w-1/2 h-full bg-gradient-to-l from-primary/5 to-transparent"></div>
            </div>
            <div class="relative z-10 grid grid-cols-12 gap-12 items-center h-full max-w-7xl mx-auto">
                <!-- Text Content -->
                <div class="col-span-12 lg:col-span-6 flex flex-col items-start space-y-6">

                    <img src="Logo_Roland-Garros.svg.png" alt="Logo Roland Garros" class="w-40 h-40">
                    <div
                        class="inline-flex items-center px-4 py-1.5 rounded-full bg-secondary-container text-on-secondary-container font-label font-bold text-[0.7rem] tracking-[0.05em] uppercase">
                        Édition 2026
                    </div>
                    <h1
                        class="text-[4rem] xl:text-[5rem] leading-[0.9] font-extrabold tracking-[-0.04em] text-primary italic">
                        Vivez l'émotion <br />
                        <span class="text-on-surface">Roland-Garros</span>
                    </h1>
                    <p class="max-w-md text-lg font-body text-on-surface-variant leading-relaxed">
                        Tentez votre chance pour remporter une place au cœur du temple de la terre battue.
                        Un héritage de prestige vous attend.
                    </p>
                    <div class="flex items-center gap-6 pt-4">
                        <button onclick="window.location.href='inscription.html'"
                            class="bg-gradient-to-r from-primary to-primary-container text-on-primary px-12 py-5 rounded-full font-headline font-bold text-xl shadow-2xl shadow-primary/30 hover:scale-105 transition-transform active:scale-95">
                            Tenter ma chance
                        </button>
                        <!--<button
                            class="flex items-center gap-2 text-secondary font-headline font-bold hover:gap-4 transition-all">
                            Les lots
                            <span class="material-symbols-outlined">arrow_forward</span>
                        </button>-->
                    </div>
                    <div class="pt-8 border-t border-outline-variant/30 w-full mt-4">
                        <div
                            class="flex gap-8 opacity-40 grayscale text-[0.65rem] font-bold tracking-[0.2em] uppercase">

                            <img src="partenaires/5ee9db6d2464c_Logo_BNP_Paribas.webp" alt="bnp paribas">
                            <img src="partenaires/69a56ca1d9e79_emirate_partner_png.webp" alt="emirates">
                            <img src="partenaires/5ee9f12930760_Lacoste_Official_1.webp" alt="lacoste">
                            <!--<img src="partenaires/6239e32c3f8ae_Logo_Renault_.webp" alt="Renault">-->
                        </div>
                    </div>
                </div>
                <!-- Featured Imagery (Landscape Optimized) -->
                <div class="hidden lg:block col-span-6 relative h-[80%]">
                    <!-- Main Image Overlay -->
                    <div
                        class="relative w-full h-full max-h-[600px] aspect-[4/5] mx-auto rounded-lg overflow-hidden editorial-shadow transform rotate-2 z-20">
                        <img alt="Premium Roland Garros tickets and white panama hat on clay surface"
                            class="w-full h-full object-cover"
                            data-alt="Close-up of premium Roland Garros gold-embossed tickets resting on a classic white panama hat with orange ribbon, sunlit on a textured clay tennis court background."
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuCkAEN6H7Bj9J7d2a0yOiojY-CQWjAOQnnIt0rtT_EHHmPAU0E15g5cLXAyv8EUUlR211NBrT3PuJqqp0kvx6Lg-pSNnRmbD8Xgm9jYGJlsMBcS2CMbfuohTPQbaQ8WD9ScUyNkVpgo4dETqKvyZE2tiYMR5ulosFpI7qsnJjQwaRRKBY4elCgkjkQngkGvgrxaT6yHXqZo_rfnQoL5IqdcEaG-AMZjAh3nkyzbBO5TPsV6FWp8kVHwFRY6PBkmFZKSEVNAqxjUhE0" />
                    </div>
                    <!-- Decorative Element -->
                    <div
                        class="absolute -top-6 -left-12 w-48 h-48 rounded-lg overflow-hidden editorial-shadow -rotate-6 z-10 border-8 border-surface-container-lowest">
                        <img alt="Professional tennis racket strings with clay dust" class="w-full h-full object-cover"
                            data-alt="Detailed close-up of high-end tennis racket strings with visible orange clay dust particles, cinematic lighting highlighting the texture and professional quality."
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuD9hCYmnuye-C3r849X8Pt9MB9yolWW2XaBfXKrUjalXdZKj0Tae7MTrdhZQxGDRNxAx9Oe9pwx97ow_l87H6UzkbJUkVhwwxksP8Uc5zzS6h31-Zc-izoc0cRxaz60U44BVHI3-YNbGPpWuS9bzNJ5t-HbY4DKsm1ziZmRnqirWtVL8Z7V4Vuae1yry5tZ4FW2FtN9syOcqpVUgaNaaa-80SXoYuxOxTznbIOWrpj35YJXqNHB3DAdsqmuvzNxVcrd--2J0Ik_mUg" />
                    </div>
                    <!-- Floating Stat Chip -->
                    <div
                        class="absolute bottom-12 -right-4 glass-nav p-5 rounded-xl editorial-shadow z-30 flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white">
                            <span class="material-symbols-outlined text-sm">redeem</span>
                        </div>
                        <div>
                            <div class="text-on-surface font-bold text-[0.6rem] uppercase tracking-wider">Valeur Totale
                            </div>
                            <div class="text-xl font-black text-primary">15,000€+</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <!-- Subtle Footer Decoration (Since no scrolling, we keep it very minimal) -->
    <div class="absolute bottom-4 left-0 w-full px-16 lg:px-24 flex justify-between items-end z-20 pointer-events-none">
        <div class="text-[0.6rem] text-on-surface-variant/50 font-label tracking-widest uppercase">
            © 2026 Vif-Argent - La Fourmi
        </div>
        <div class="text-[0.6rem] text-on-surface-variant/50 font-label tracking-widest uppercase">
            Clôture le 24 Mai
        </div>
    </div>
</body>

</html>
